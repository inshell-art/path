name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  public-safe-boundary:
    name: Public-Safe Ops Boundary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check public-safe boundary
        run: ./scripts/check-public-safe-ops.sh

  evm-test:
    name: EVM Solidity Tests
    needs: public-safe-boundary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: evm/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test
